services:
  backend:
    image: tarunpradeep6162/birthday-backend:latest
    container_name: birthday-backend
    restart: unless-stopped

    env_file:
      - .env

    expose:
      - "5000"

    volumes:
      - birthday_uploads:/app/uploads
      - birthday_logs:/app/logs
      - birthday_data:/app/database

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5000/api/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - birthday-network

  frontend:
    image: tarunpradeep6162/birthday-frontend:latest
    container_name: birthday-frontend
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - birthday-network

volumes:
  birthday_uploads:
    name: birthday_uploads

  birthday_logs:
    name: birthday_logs

  birthday_data:
    name: birthday_data

networks:
  birthday-network:
    name: birthday-network
    driver: bridge
